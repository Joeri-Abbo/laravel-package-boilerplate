name: Test

on: [ 'push' ]

jobs:
  psalm:
    name: php unit tests (${{ matrix.php }}${{ matrix.composer != '' && format(', {0}', matrix.composer) || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.1
          - 8.2
          - 8.3
        composer:
          - ""
          - "--prefer-lowest"
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install Dependencies
        run: composer install ${{ matrix.composer }}
      - name: Run tests
        run: composer test
